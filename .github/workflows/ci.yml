name: CI — Lint & Import Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style issues
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=100 --statistics --exclude=venv,__pycache__

  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU-only PyTorch + dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Verify core module imports
        run: |
          python -c "from models.networks import ResnetGenerator, NLayerDiscriminator, GANLoss; print('networks OK')"
          python -c "from util.image_pool import ImagePool; print('image_pool OK')"
          python -c "from util.util import tensor2im, save_image, mkdirs; print('util OK')"
          python -c "from data.base_dataset import BaseDataset, get_transform; print('base_dataset OK')"
